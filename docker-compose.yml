services:
  flower_db:
    image: mysql:8.0
    container_name: flower_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flower_shop_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  flower_app:
    build: .
    container_name: flower_app
    ports:
      - "8080:8080"
    depends_on:
      flower_db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://flower_db:3306/flower_shop_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root